<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator with jQuery and Bootstrap</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com">
    <link rel="stylesheet" href="style.css">
    <!-- jQuery -->
    <script src="https://code.jquery.com"></script>
    <!-- Bootstrap JS -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1 class="mt-5">GPA Calculator</h1>
        <div id="result" class="mt-3"></div> <!-- هنا ستظهر النتائج -->
        <form id="gpaForm" class="mt-3">
            <div id="courses">
                <div class="course-row form-row mb-2">
                    <div class="col">
                        <input type="text" name="course[]" class="form-control" placeholder="Course name" required>
                    </div>
                    <div class="col-2">
                        <input type="number" name="credits[]" class="form-control" placeholder="Credits" min="1" required>
                    </div>
                    <div class="col-2">
                        <select name="grade[]" class="form-control">
                            <option value="4.0">A</option>
                            <option value="3.0">B</option>
                            <option value="2.0">C</option>
                            <option value="1.0">D</option>
                            <option value="0.0">F</option>
                        </select>
                    </div>
                </div>
            </div>
            <button type="button" id="addCourse" class="btn btn-secondary mb-3">+ Add Course</button>
            <br>
            <button type="submit" class="btn btn-primary">Calculate GPA</button>
        </form>
    </div>
</body>
</html>
